name: Policy and CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

permissions:
  contents: read
  pull-requests: read

jobs:
  validate:
    name: Validate integration files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate JSON files
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          files = [
              Path('custom_components/fs_usb_beacon/manifest.json'),
              Path('custom_components/fs_usb_beacon/strings.json'),
              Path('hacs.json'),
          ]

          for file in files:
              with file.open('r', encoding='utf-8') as f:
                  json.load(f)
              print(f'OK JSON: {file}')
          PY

      - name: Compile Python sources
        shell: bash
        run: |
          python -m compileall -q custom_components

  pr-policy:
    name: PR policy checks
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    env:
      MAINTAINER_LOGIN: Brisket604

    steps:
      - name: Enforce PR title format
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        shell: bash
        run: |
          echo "PR title: $PR_TITLE"
          if [[ ! "$PR_TITLE" =~ ^(feat|fix|docs|refactor|chore|ci|test|perf|build)(\(.+\))?:\ .+ ]]; then
            echo "Invalid PR title format. Expected: <type>: <description>"
            exit 1
          fi

      - name: Require non-empty PR description
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        shell: bash
        run: |
          if [[ -z "${PR_BODY// }" ]]; then
            echo "PR description must not be empty."
            exit 1
          fi

      - name: Enforce maintainer validation
        uses: actions/github-script@v7
        with:
          script: |
            const maintainer = process.env.MAINTAINER_LOGIN.toLowerCase();
            const author = context.payload.pull_request.user.login.toLowerCase();

            if (author === maintainer) {
              core.info(`PR opened by @${process.env.MAINTAINER_LOGIN}; maintainer approval check is satisfied.`);
              return;
            }

            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100,
            });

            // Keep only each user's latest review state.
            const latestStateByUser = new Map();
            for (const review of reviews) {
              if (!review.user?.login) continue;
              latestStateByUser.set(review.user.login.toLowerCase(), review.state);
            }

            const maintainerState = latestStateByUser.get(maintainer);
            if (maintainerState !== 'APPROVED') {
              core.setFailed(`This PR must be approved by @${process.env.MAINTAINER_LOGIN}.`);
            } else {
              core.info(`Approval by @${process.env.MAINTAINER_LOGIN} detected.`);
            }
